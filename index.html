function RoleBadge({roleKey,small}){
const r=ROLES[roleKey];if(!r)return null;
return e("span",{style:{display:"inline-block",padding:small?"1px 6px":"2px 8px",borderRadius:"4px",fontSize:small?"10px":"11px",fontWeight:600,color:r.color,backgroundColor:r.bg,border:"1px solid "+r.color+"20",marginRight:"4px",marginBottom:"2px"}},r.label);
}

function CheckItem({text,checked,onChange}){
return e("label",{style:{display:"flex",alignItems:"flex-start",gap:"8px",padding:"6px 0",cursor:"pointer",fontSize:"13px",lineHeight:"1.4",color:checked?"#9CA3AF":"#1F2937",textDecoration:checked?"line-through":"none",userSelect:"none"}},
e("input",{type:"checkbox",checked:checked,onChange:onChange,style:{marginTop:"2px",accentColor:"#3B82F6",cursor:"pointer",flexShrink:0}}),
e("span",null,text));
}

function ProgressBar({completed,total}){
const pct=total>0?Math.round(completed/total*100):0;
return e("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginTop:"4px"}},
e("div",{style:{flex:1,height:"6px",backgroundColor:"#E5E7EB",borderRadius:"3px",overflow:"hidden"}},
e("div",{style:{width:pct+"%",height:"100%",backgroundColor:pct===100?"#10B981":"#3B82F6",borderRadius:"3px",transition:"width 0.3s ease"}})),
e("span",{style:{fontSize:"11px",color:"#6B7280",fontWeight:600,minWidth:"42px"}},completed+"/"+total));
}

function StageCard({stage,checks,onCheck,expanded,onToggle,roleFilter}){
const allRoles=[...(stage.owner||[]),...(stage.participants||[])];
const relevantRoles=roleFilter?Object.keys(stage.checklist||{}).filter(r=>r===roleFilter):Object.keys(stage.checklist||{});
let totalItems=0,checkedItems=0;
relevantRoles.forEach(r=>{(stage.checklist[r]||[]).forEach((_,i)=>{totalItems++;if(checks[stage.id+"-"+r+"-"+i])checkedItems++;});});
const isComplete=totalItems>0&&checkedItems===totalItems;
if(roleFilter&&!allRoles.includes(roleFilter)&&relevantRoles.length===0)return null;

return e("div",{style:{border:stage.gate?"2px solid #EF4444":"1px solid #E5E7EB",borderRadius:"8px",marginBottom:"8px",backgroundColor:isComplete?"#F0FDF4":"#FFF",overflow:"hidden",transition:"all 0.2s"}},
e("div",{onClick:onToggle,style:{padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:"12px",userSelect:"none"}},
e("span",{style:{fontSize:"16px",color:"#9CA3AF",transform:expanded?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s",flexShrink:0}},"\u25B6"),
e("div",{style:{flex:1}},
e("div",{style:{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}},
e("span",{style:{fontWeight:700,fontSize:"14px",color:"#111827"}},stage.name),
stage.gate&&e("span",{style:{fontSize:"10px",fontWeight:700,color:"#EF4444",border:"1px solid #EF4444",borderRadius:"4px",padding:"1px 6px",textTransform:"uppercase"}},"GATE"),
isComplete&&e("span",{style:{fontSize:"13px",color:"#10B981"}},"\u2713")),
e("div",{style:{marginTop:"4px"}},
...(stage.owner||[]).map(r=>e(RoleBadge,{key:r,roleKey:r,small:true})),
...(stage.participants||[]).map(r=>e("span",{key:r,style:{fontSize:"10px",color:"#9CA3AF",marginRight:"4px"}},"+"+ROLES[r]?.label))),
e(ProgressBar,{completed:checkedItems,total:totalItems}))),
expanded&&e("div",{style:{padding:"0 16px 16px 16px",borderTop:"1px solid #F3F4F6"}},
e("p",{style:{fontSize:"12px",color:"#6B7280",margin:"12px 0 8px 0",lineHeight:"1.5"}},stage.description),
stage.artifacts&&e("div",{style:{marginBottom:"12px"}},
e("div",{style:{fontSize:"11px",fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:"4px"}},"Artifacts"),
e("div",{style:{display:"flex",flexWrap:"wrap",gap:"4px"}},
...stage.artifacts.map(a=>e("span",{key:a,style:{fontSize:"11px",backgroundColor:"#F3F4F6",padding:"2px 8px",borderRadius:"4px",color:"#4B5563"}},a)))),
...relevantRoles.map(roleKey=>e("div",{key:roleKey,style:{marginBottom:"12px"}},
e(RoleBadge,{roleKey:roleKey}),
e("div",{style:{marginLeft:"4px",marginTop:"4px"}},
...(stage.checklist[roleKey]||[]).map((item,i)=>e(CheckItem,{key:i,text:item,checked:!!checks[stage.id+"-"+roleKey+"-"+i],onChange:()=>onCheck(stage.id+"-"+roleKey+"-"+i)})))))));
}

function App(){
const[track,setTrack]=useState("full");
const[roleFilter,setRoleFilter]=useState(null);
const[checks,setChecks]=useState(()=>{try{const s=window.localStorage?.getItem("fl-checks");return s?JSON.parse(s):{}}catch(e){return{}}});
const[expanded,setExpanded]=useState({});
const[featureName,setFeatureName]=useState(()=>{try{return window.localStorage?.getItem("fl-name")||""}catch(e){return""}});

useEffect(()=>{try{window.localStorage?.setItem("fl-checks",JSON.stringify(checks))}catch(e){}},[checks]);
useEffect(()=>{try{window.localStorage?.setItem("fl-name",featureName)}catch(e){}},[featureName]);

const stages=track==="full"?FULL_CYCLE:FAST_TRACK;
const toggleCheck=useCallback(key=>{setChecks(prev=>({...prev,[key]:!prev[key]}));},[]);
const toggleExpand=useCallback(id=>{setExpanded(prev=>({...prev,[id]:!prev[id]}));},[]);
const expandAll=()=>{const a={};stages.forEach(s=>a[s.id]=true);setExpanded(a);};
const collapseAll=()=>setExpanded({});

const stats=useMemo(()=>{
let total=0,checked=0;
stages.forEach(stage=>{
const roles=roleFilter?Object.keys(stage.checklist||{}).filter(r=>r===roleFilter):Object.keys(stage.checklist||{});
roles.forEach(r=>{(stage.checklist[r]||[]).forEach((_,i)=>{total++;if(checks[stage.id+"-"+r+"-"+i])checked++;});});
});
return{total,checked,pct:total>0?Math.round(checked/total*100):0};
},[checks,stages,roleFilter]);

const resetAll=()=>{setChecks({});setExpanded({});setFeatureName("");try{window.localStorage?.removeItem("fl-checks");window.localStorage?.removeItem("fl-name")}catch(e){}};

return e("div",{style:{maxWidth:"720px",margin:"0 auto",padding:"16px"}},
e("div",{style:{marginBottom:"20px"}},
e("h1",{style:{fontSize:"22px",fontWeight:800,color:"#111827",margin:"0 0 4px 0"}},"Feature Lifecycle"),
e("p",{style:{fontSize:"13px",color:"#6B7280",margin:0}},"Freedom Finance — Banking Products")),

e("input",{type:"text",placeholder:"Название фичи / задачи...",value:featureName,onChange:ev=>setFeatureName(ev.target.value),style:{width:"100%",padding:"10px 12px",border:"1px solid #D1D5DB",borderRadius:"6px",fontSize:"14px",marginBottom:"16px",outline:"none",boxSizing:"border-box"}}),

e("div",{style:{display:"flex",gap:"8px",marginBottom:"16px"}},
[{key:"full",label:"Full Cycle",desc:"Roadmap features"},{key:"fast",label:"Fast-Track",desc:"Hotfixes, ops tasks"}].map(t=>
e("button",{key:t.key,onClick:()=>{setTrack(t.key);setExpanded({});},style:{flex:1,padding:"10px",border:track===t.key?"2px solid #3B82F6":"1px solid #E5E7EB",borderRadius:"8px",backgroundColor:track===t.key?"#EFF6FF":"#FFF",cursor:"pointer",textAlign:"center"}},
e("div",{style:{fontWeight:700,fontSize:"14px",color:track===t.key?"#1D4ED8":"#374151"}},t.label),
e("div",{style:{fontSize:"11px",color:"#9CA3AF"}},t.desc)))),

e("div",{style:{marginBottom:"16px"}},
e("div",{style:{fontSize:"11px",fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:"6px"}},"Filter by Role"),
e("div",{style:{display:"flex",flexWrap:"wrap",gap:"4px"}},
e("button",{onClick:()=>setRoleFilter(null),style:{padding:"4px 10px",borderRadius:"4px",border:!roleFilter?"2px solid #374151":"1px solid #E5E7EB",backgroundColor:!roleFilter?"#1F2937":"#FFF",color:!roleFilter?"#FFF":"#6B7280",fontSize:"12px",fontWeight:600,cursor:"pointer"}},"All"),
...Object.entries(ROLES).map(([key,role])=>
e("button",{key:key,onClick:()=>setRoleFilter(roleFilter===key?null:key),style:{padding:"4px 10px",borderRadius:"4px",border:roleFilter===key?"2px solid "+role.color:"1px solid #E5E7EB",backgroundColor:roleFilter===key?role.bg:"#FFF",color:roleFilter===key?role.color:"#6B7280",fontSize:"12px",fontWeight:600,cursor:"pointer"}},role.label)))),

e("div",{style:{backgroundColor:"#F9FAFB",borderRadius:"8px",padding:"12px 16px",marginBottom:"16px",border:"1px solid #E5E7EB"}},
e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
e("span",{style:{fontSize:"13px",fontWeight:600,color:"#374151"}},"Overall Progress"+(roleFilter?" ("+ROLES[roleFilter].label+")":"")),
e("span",{style:{fontSize:"20px",fontWeight:800,color:stats.pct===100?"#10B981":"#3B82F6"}},stats.pct+"%")),
e(ProgressBar,{completed:stats.checked,total:stats.total}),
e("div",{style:{display:"flex",gap:"8px",marginTop:"8px"}},
e("button",{onClick:expandAll,style:{fontSize:"11px",color:"#6B7280",cursor:"pointer",background:"none",border:"none",padding:0,textDecoration:"underline"}},"Expand All"),
e("button",{onClick:collapseAll,style:{fontSize:"11px",color:"#6B7280",cursor:"pointer",background:"none",border:"none",padding:0,textDecoration:"underline"}},"Collapse All"),
e("button",{onClick:resetAll,style:{fontSize:"11px",color:"#EF4444",cursor:"pointer",background:"none",border:"none",padding:0,textDecoration:"underline"}},"Reset"))),

...stages.map(stage=>e(StageCard,{key:stage.id,stage:stage,checks:checks,onCheck:toggleCheck,expanded:!!expanded[stage.id],onToggle:()=>toggleExpand(stage.id),roleFilter:roleFilter})),

e("div",{style:{marginTop:"24px",padding:"12px 16px",backgroundColor:"#FFFBEB",borderRadius:"8px",border:"1px solid #FDE68A"}},
e("div",{style:{fontSize:"12px",fontWeight:700,color:"#92400E",marginBottom:"4px"}},"Context & Constraints"),
e("ul",{style:{margin:0,paddingLeft:"16px",fontSize:"12px",color:"#78350F",lineHeight:"1.6"}},
e("li",null,"Роли SA и Analytics отсутствуют. Техдокументация — на Tech Lead / Senior. Аналитика — gap."),
e("li",null,"Единая кодовая база с TN — обязательна оценка влияния на каждом этапе."),
e("li",null,"Feature flags — обязательны для всех крупных фич. Раскатка: Dev → RC → Prod (10%) → Prod (100%)."),
e("li",null,"Compliance-согласование — до начала разработки для customer-facing изменений."),
e("li",null,"Тестирование на проде (позиция Дениса) — учитывать при планировании QA."))));
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
